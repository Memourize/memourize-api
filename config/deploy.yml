service: memourize_api
image: ermeson/memourize_api

ssh:
  user: root
  keys: ['~/.ssh/hetzner']

servers:
  web:
    - 178.104.212.4

proxy:
  ssl: true
  host: 178.104.212.4

registry:
  server: localhost:5555

env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: true

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

volumes:
  - "memourize_api_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64
